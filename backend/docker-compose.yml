services:
  postgres:
    image: postgres:16-alpine
    container_name: tends-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tends
      POSTGRES_PASSWORD: tends
      POSTGRES_DB: tends
    ports:
      - "5432:5432"
    volumes:
      - tends-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tends -d tends"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tends-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tends-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tends-pgdata:
  tends-redisdata:
