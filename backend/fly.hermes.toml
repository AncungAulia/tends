# Fly.io — Hermes Agent gateway (OpenAI-compatible) + the Tends MCP tools server.
#
# INTERNAL ONLY: no public IP. The backend reaches it over Fly's private 6PN
# network at  http://tends-hermes.internal:8642/v1  (set as HERMES_BASE_URL on
# tends-api). Single always-on machine; the gateway spawns the Node MCP server.
#
# Deploy:  fly deploy -c fly.hermes.toml    (from backend/; build context = backend/)
# Logs:    fly logs -a tends-hermes

app = "tends-hermes"
primary_region = "sin"

[build]
  dockerfile = "hermes/Dockerfile"

[env]
  API_SERVER_ENABLED = "true"
  API_SERVER_HOST = "0.0.0.0"
  API_SERVER_PORT = "8642"
  GATEWAY_ALLOW_ALL_USERS = "true"
  PYTHONUNBUFFERED = "1"

# Persists /root/.hermes/auth.json (the GitHub Copilot OAuth credential) across
# deploys/restarts. The entrypoint re-seeds config.yaml from the image each start
# but leaves auth.json in this volume untouched.
# Create once:  fly volumes create hermes_home --size 1 -a tends-hermes -r sin
[[mounts]]
  source = "hermes_home"
  destination = "/root/.hermes"

# Private service — declared so the machine stays up; no `ports` = no public IP.
# Other Fly apps reach it via the <app>.internal DNS name on this port.
[[services]]
  internal_port = 8642
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
