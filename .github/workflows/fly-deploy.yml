name: Fly Deploy (backend)

# Auto-deploy the backend stack to Fly.io on push to the `backend` branch.
# - tends-api    rebuilds when the API source / Dockerfile / fly.toml change
# - tends-hermes rebuilds when the shared src / prisma / hermes/** change
#   (the MCP server inside hermes is built from backend/src, so src changes
#    redeploy BOTH apps).
# Builds run on Fly's remote builders (--remote-only) so no Docker is needed here.

on:
  push:
    branches: [backend]
    paths:
      - "backend/**"
      - ".github/workflows/fly-deploy.yml"

# Never cancel a deploy mid-flight; queue if a new push lands while one runs.
concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      hermes: ${{ steps.filter.outputs.hermes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'backend/src/**'
              - 'backend/prisma/**'
              - 'backend/package.json'
              - 'backend/pnpm-lock.yaml'
              - 'backend/pnpm-workspace.yaml'
              - 'backend/Dockerfile'
              - 'backend/fly.toml'
              - '.github/workflows/fly-deploy.yml'
            hermes:
              - 'backend/src/**'
              - 'backend/prisma/**'
              - 'backend/package.json'
              - 'backend/pnpm-lock.yaml'
              - 'backend/pnpm-workspace.yaml'
              - 'backend/hermes/**'
              - 'backend/fly.hermes.toml'
              - '.github/workflows/fly-deploy.yml'

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # release_command in fly.toml runs `prisma migrate deploy` before going live.
      - run: flyctl deploy --remote-only -c fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-hermes:
    needs: changes
    if: needs.changes.outputs.hermes == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only -c fly.hermes.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
